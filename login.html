<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NurtureEd – Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eafaf1, #e3f2fd);
      overflow: hidden;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.6;
      z-index: 0;
    }
    .blob1 { width: 260px; height: 260px; background: #a8edea; top: 10%; left: 15%; }
    .blob2 { width: 300px; height: 300px; background: #cfd9ff; bottom: 10%; right: 15%; }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.08);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: fadeIn 0.6s ease;
    }

    .logo { font-size: 1.4rem; font-weight: 700; color: #2c7a7b; text-align: center; }
    h2 { font-size: 1.5rem; text-align: center; color: #2c3e50; }
    .subtitle { font-size: 0.85rem; color: #8fa3b0; text-align: center; margin-top: -8px; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label { font-size: 0.8rem; color: #6b7c93; font-weight: 500; }

    input {
      padding: 11px 14px;
      border-radius: 10px;
      border: 1.5px solid #dce6ed;
      font-size: 0.95rem;
      background: #f9fcfd;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #2c7a7b; }

    .btn-primary {
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #2c7a7b;
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 4px;
    }
    .btn-primary:hover { background: #235f60; transform: translateY(-1px); }

    .divider { text-align: center; color: #b0c4ce; font-size: 0.8rem; }

    .btn-secondary {
      padding: 12px;
      border-radius: 12px;
      border: 1.5px solid #a8edea;
      background: transparent;
      color: #2c7a7b;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-secondary:hover { background: #eafaf1; transform: translateY(-1px); }

    .back { text-align: center; font-size: 0.8rem; color: #8fa3b0; }
    .back a { color: #2c7a7b; text-decoration: none; font-weight: 500; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 450px) {
      .card { padding: 36px 24px; margin: 16px; }
    }
  </style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="card">
  <div class="logo">NurtureEd</div>
  <h2>Welcome back 👋</h2>
  <p class="subtitle">Sign in to your account</p>

  <div class="field">
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@example.com">
  </div>

  <div class="field">
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="••••••••">
  </div>

  <button class="btn-primary" id="loginBtn">Login</button>

  <div class="divider">— or —</div>

  <button class="btn-secondary" id="registerBtn">Create Student Account</button>

  <div class="back"><a href="index.html">← Back to home</a></div>
</div>

<script type="module" src="./login.js"></script>
<script type="module" src="./auth-state.js"></script>
</body>
</html>
